name: Sync Diario — Mercado Público

on:
  # Disparado por cron-job.org vía /api/sync (Bearer CRON_SECRET)
  # El schedule de GitHub Actions está desactivado para evitar doble ejecución.
  repository_dispatch:
    types: [manual-sync]

  # Permite ejecutar manualmente desde la UI de GitHub Actions
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: sync/requirements.txt

      - name: Install dependencies
        run: pip install -r sync/requirements.txt

      - name: Run sync
        env:
          MERCADO_PUBLICO_TICKET: ${{ secrets.MERCADO_PUBLICO_TICKET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python sync/reasy_sync.py
