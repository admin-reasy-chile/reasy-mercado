name: Sync Diario — Mercado Público

on:
  # Cron: 9:00 AM hora Chile (UTC-3 en invierno, UTC-4 en verano)
  # Usamos 12:00 UTC para cubrir ambos horarios con margen.
  schedule:
    - cron: '0 12 * * *'

  # Permite disparo manual desde GitHub o via webhook desde el dashboard
  repository_dispatch:
    types: [manual-sync]

  # Permite ejecutar desde la UI de GitHub Actions
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: sync/requirements.txt

      - name: Install dependencies
        run: pip install -r sync/requirements.txt

      - name: Run sync
        env:
          MERCADO_PUBLICO_TICKET: ${{ secrets.MERCADO_PUBLICO_TICKET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python sync/reasy_sync.py
